<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

<h3>Feedback</h3>

<table class="table table-bordered">
<tr>
<th>Name</th>
<th>Food</th>
<th>Rating</th>
<th>Comment</th>
</tr>

{% for row in feedback %}
<tr>
<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
<td>{{row[3]}}</td>
<td>{{row[4]}}</td>
</tr>
{% endfor %}
</table>

<h3>Orders</h3>

<table class="table table-bordered">
<tr>
<th>Name</th>
<th>Items</th>
</tr>

{% for row in orders %}
<tr>
<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
</tr>
{% endfor %}
</table>

</div>
</body>
</html>
