<!DOCTYPE html>
<html>
<head>
<title>Order</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-warning">

<div class="container mt-5">
<div class="card p-4">

<h3>Order Food</h3>

<form method="POST">

<input type="text" name="name" class="form-control mb-3" placeholder="Name" required>

<label>Idli (₹10)</label>
<input type="number" name="idli" class="form-control mb-2">

<label>Dosa (₹20)</label>
<input type="number" name="dosa" class="form-control mb-2">

<label>Rice (₹30)</label>
<input type="number" name="rice" class="form-control mb-2">

<label>Meals (₹50)</label>
<input type="number" name="meals" class="form-control mb-2">

<label>Chapati (₹15)</label>
<input type="number" name="chapati" class="form-control mb-2">

<label>Parotta (₹25)</label>
<input type="number" name="parotta" class="form-control mb-3">

<button class="btn btn-success w-100">Order</button>

</form>

</div>
</div>
</body>
</html>
