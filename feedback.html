<!DOCTYPE html>
<html>
<head>
<title>Feedback</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-info d-flex justify-content-center align-items-center" style="height:100vh;">

<div class="card p-4">
<h3>Feedback</h3>

<form method="POST">

<input name="name" class="form-control mb-2" placeholder="Name">
<input name="food" class="form-control mb-2" placeholder="Food">

<select name="rating" class="form-control mb-2">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
</select>

<textarea name="comment" class="form-control mb-2"></textarea>

<button class="btn btn-primary w-100">Submit</button>

</form>

</div>
</body>
</html>
